    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install modules
        shell: pwsh
        run: |
          if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) { Register-PSRepository -Default }
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Microsoft.Graph.Authentication -Force -Scope CurrentUser
          Install-Module Microsoft.Graph.Identity.DirectoryManagement -Force -Scope CurrentUser
          # For the app's own directory-role-assignment preflight check:
          # Get-MgServicePrincipal is in Microsoft.Graph.Applications and
          # Get-MgRoleManagementDirectoryRoleAssignment is in
          # Microsoft.Graph.Identity.Governance. Both must be installed
          # fresh so their Microsoft.Graph.Authentication dependency matches
          # the freshly-installed one — otherwise PowerShell auto-loads the
          # runner image's pre-installed (older) module and fails with
          # "Assembly with same name is already loaded" (confirmed live).
          Install-Module Microsoft.Graph.Applications -Force -Scope CurrentUser
          Install-Module Microsoft.Graph.Identity.Governance -Force -Scope CurrentUser
          # Pinned to an exact 3.9.0 (was -MinimumVersion 3.7.2, which now
          # resolves to 3.10.0). Confirmed live: 3.10.0 has a regression
          # where Connect-IPPSSession crashes with "Object reference not
          # set to an instance of an object" for certificate-based app-only
          # auth, even with fully correct Entra role assignments (verified
          # by decoding the actual token's "wids" claim) — 3.9.0 connects
          # successfully with the identical call. See
          # Tests/E2E/Invoke-RetentionPoliciesE2E.ps1 for detail.
          Install-Module ExchangeOnlineManagement -RequiredVersion 3.9.0 -Force -Scope CurrentUser

      - name: Import auth certificate
        shell: pwsh
        env:
          M365_PFX_BASE64: ${{ secrets.M365_PFX_BASE64 }}
          M365_PFX_PASSWORD: ${{ secrets.M365_PFX_PASSWORD }}
        run: |
