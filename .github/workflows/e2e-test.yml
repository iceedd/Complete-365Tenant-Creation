          Install-Module Microsoft.Graph.Groups -Force -Scope CurrentUser

      - name: Import auth certificate
        shell: pwsh
        env:
          M365_PFX_BASE64: ${{ secrets.M365_PFX_BASE64 }}
          M365_PFX_PASSWORD: ${{ secrets.M365_PFX_PASSWORD }}
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP 'e2e.pfx'
