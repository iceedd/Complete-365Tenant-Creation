          if ($env:CERT_THUMBPRINT) {
            Remove-Item "Cert:\CurrentUser\My\$env:CERT_THUMBPRINT" -ErrorAction SilentlyContinue
          }

  e2e-site-creation:
    name: Site-Creation end-to-end
    runs-on: windows-latest
    # Higher than the other jobs' 20 minutes — SharePoint site provisioning
    # and recycle-bin purging are both documented as slower, multi-minute
    # operations (see Tests/E2E/Invoke-SiteCreationE2E.ps1's poll loops).
    timeout-minutes: 35
    # Chained after e2e-retention-policies to avoid two jobs mutating tenant
    # state at once, matching the rest of the E2E chain.
    needs: e2e-retention-policies
    if: |
      always() &&
      (needs.e2e-retention-policies.result == 'success' || needs.e2e-retention-policies.result == 'skipped') &&
      (github.event_name != 'workflow_dispatch' || inputs.only_job == 'all' || inputs.only_job == 'site-creation')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install modules
        shell: pwsh
        run: |
          if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) { Register-PSRepository -Default }
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Microsoft.Graph.Authentication -Force -Scope CurrentUser

      - name: Install SPO module (Windows PowerShell)
        # The SPO Management Shell is a Windows PowerShell module — the E2E
        # tests import it via PS7's -UseWindowsPowerShell compatibility
        # session, which only scans Windows PowerShell module paths, so it
        # must be installed from Windows PowerShell 5.1, not pwsh.
        shell: powershell
        run: |
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force | Out-Null
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
