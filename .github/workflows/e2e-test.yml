name: E2E Test (M365 test tenant)

# Creates and deletes real objects in the test tenant, so this does NOT run
# on every PR: trigger manually from the Actions tab, or let the weekly
# scheduled run catch regressions.
on:
  workflow_dispatch:
    inputs:
      only_job:
        description: >-
          Run only this one job (for fast iteration while developing a single
          script's E2E test). Each job's own script already sets up its
          prerequisites and cleans up after itself — the needs: chaining
          below exists solely to stop two jobs from mutating the same
          "E2E-" prefixed objects in the shared test tenant at once, so
          running a single job in isolation is safe. Leave as "all" (the
          default) for full regression coverage before merging.
        type: choice
        default: all
        options:
          - all
          - security-groups
          - admin-creation
          - ca-policies
          - auth-methods
          - password-policies
          - device-groups
          - compliance-policies
          - configuration-policies
          - wau-deployment
          - shared-mb-creation
          - distribution-lists
          - archive-policies
          - anti-phishing
          - safe-attachments
          - web-filtering
          - retention-policies
          - site-creation
          - site-groups
          - permission-groups
          - external-sharing
  schedule:
    - cron: '0 3 * * 1' # Mondays 03:00 UTC

concurrency:
  group: m365-e2e-test
  cancel-in-progress: false

jobs:
  e2e-security-groups:
    name: Security-Groups end-to-end
    if: github.event_name != 'workflow_dispatch' || inputs.only_job == 'all' || inputs.only_job == 'security-groups'
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install modules
        shell: pwsh
        run: |
          if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) { Register-PSRepository -Default }
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Microsoft.Graph.Authentication -Force -Scope CurrentUser
          Install-Module Microsoft.Graph.Groups -Force -Scope CurrentUser
          # Security-Groups.ps1 imports Identity.DirectoryManagement — it must be
          # installed fresh alongside Authentication, or the runner's pre-installed
          # copy (built against an older Authentication assembly) fails to import
          # with "Assembly with same name is already loaded" (confirmed live).
          Install-Module Microsoft.Graph.Identity.DirectoryManagement -Force -Scope CurrentUser

      - name: Import auth certificate
        shell: pwsh
        env:
          M365_PFX_BASE64: ${{ secrets.M365_PFX_BASE64 }}
          M365_PFX_PASSWORD: ${{ secrets.M365_PFX_PASSWORD }}
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP 'e2e.pfx'
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:M365_PFX_BASE64))
          $pwd = ConvertTo-SecureString $env:M365_PFX_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $pwd
          Remove-Item $pfxPath -Force
          "CERT_THUMBPRINT=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Run Security-Groups E2E test
        shell: pwsh
        env:
          M365_TENANT_ID: ${{ secrets.M365_TENANT_ID }}
          M365_APP_ID: ${{ secrets.M365_APP_ID }}
        run: |
          ./Tests/E2E/Invoke-SecurityGroupsE2E.ps1 `
            -TenantId $env:M365_TENANT_ID `
            -AppId $env:M365_APP_ID `
            -CertificateThumbprint $env:CERT_THUMBPRINT

      - name: Remove auth certificate
        if: always()
        shell: pwsh
        run: |
          if ($env:CERT_THUMBPRINT) {
            Remove-Item "Cert:\CurrentUser\My\$env:CERT_THUMBPRINT" -ErrorAction SilentlyContinue
          }

  e2e-admin-creation:
    name: Admin-Creation end-to-end
    runs-on: windows-latest
    timeout-minutes: 20
    # Runs after e2e-security-groups rather than in parallel — both tests
    # create/delete "E2E-" prefixed objects in the same tenant, and this one
    # also invokes Security-Groups.ps1 itself as a setup step, so running
    # them concurrently risks the two runs colliding on the same objects.
    needs: e2e-security-groups
    if: |
      always() &&
      (needs.e2e-security-groups.result == 'success' || needs.e2e-security-groups.result == 'skipped') &&
      (github.event_name != 'workflow_dispatch' || inputs.only_job == 'all' || inputs.only_job == 'admin-creation')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install modules
        shell: pwsh
        run: |
          if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) { Register-PSRepository -Default }
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Microsoft.Graph.Authentication -Force -Scope CurrentUser
          Install-Module Microsoft.Graph.Groups -Force -Scope CurrentUser
          Install-Module Microsoft.Graph.Users -Force -Scope CurrentUser
          Install-Module Microsoft.Graph.Identity.DirectoryManagement -Force -Scope CurrentUser

      - name: Import auth certificate
        shell: pwsh
        env:
          M365_PFX_BASE64: ${{ secrets.M365_PFX_BASE64 }}
          M365_PFX_PASSWORD: ${{ secrets.M365_PFX_PASSWORD }}
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP 'e2e.pfx'
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:M365_PFX_BASE64))
          $pwd = ConvertTo-SecureString $env:M365_PFX_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $pwd
          Remove-Item $pfxPath -Force
          "CERT_THUMBPRINT=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Run Admin-Creation E2E test
        shell: pwsh
        env:
          M365_TENANT_ID: ${{ secrets.M365_TENANT_ID }}
          M365_APP_ID: ${{ secrets.M365_APP_ID }}
        run: |
          ./Tests/E2E/Invoke-AdminCreationE2E.ps1 `
            -TenantId $env:M365_TENANT_ID `
            -AppId $env:M365_APP_ID `
            -CertificateThumbprint $env:CERT_THUMBPRINT

      - name: Remove auth certificate
        if: always()
        shell: pwsh
        run: |
          if ($env:CERT_THUMBPRINT) {
            Remove-Item "Cert:\CurrentUser\My\$env:CERT_THUMBPRINT" -ErrorAction SilentlyContinue
          }

  e2e-ca-policies:
    name: CA-Policies end-to-end
    runs-on: windows-latest
    timeout-minutes: 20
    # Chained after e2e-admin-creation — this test also invokes
    # Security-Groups.ps1 as a setup step and touches "E2E-" prefixed
    # objects in the same tenant, so it must not run concurrently with
    # the other two.
    needs: e2e-admin-creation
    if: |
      always() &&
      (needs.e2e-admin-creation.result == 'success' || needs.e2e-admin-creation.result == 'skipped') &&
      (github.event_name != 'workflow_dispatch' || inputs.only_job == 'all' || inputs.only_job == 'ca-policies')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install modules
        shell: pwsh
        run: |
          if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) { Register-PSRepository -Default }
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Microsoft.Graph.Authentication -Force -Scope CurrentUser
          Install-Module Microsoft.Graph.Groups -Force -Scope CurrentUser
          Install-Module Microsoft.Graph.Identity.SignIns -Force -Scope CurrentUser
          Install-Module Microsoft.Graph.Identity.DirectoryManagement -Force -Scope CurrentUser

      - name: Import auth certificate
        shell: pwsh
        env:
          M365_PFX_BASE64: ${{ secrets.M365_PFX_BASE64 }}
          M365_PFX_PASSWORD: ${{ secrets.M365_PFX_PASSWORD }}
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP 'e2e.pfx'
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:M365_PFX_BASE64))
          $pwd = ConvertTo-SecureString $env:M365_PFX_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $pwd
          Remove-Item $pfxPath -Force
          "CERT_THUMBPRINT=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Run CA-Policies E2E test
        shell: pwsh
        env:
          M365_TENANT_ID: ${{ secrets.M365_TENANT_ID }}
          M365_APP_ID: ${{ secrets.M365_APP_ID }}
        run: |
          ./Tests/E2E/Invoke-CAPoliciesE2E.ps1 `
            -TenantId $env:M365_TENANT_ID `
            -AppId $env:M365_APP_ID `
            -CertificateThumbprint $env:CERT_THUMBPRINT

      - name: Remove auth certificate
        if: always()
        shell: pwsh
        run: |
          if ($env:CERT_THUMBPRINT) {
            Remove-Item "Cert:\CurrentUser\My\$env:CERT_THUMBPRINT" -ErrorAction SilentlyContinue
          }

  e2e-auth-methods:
    name: Auth-Methods end-to-end
    runs-on: windows-latest
    timeout-minutes: 20
    # Chained after e2e-ca-policies — this test also invokes
    # Security-Groups.ps1 as a setup step and touches "E2E-" prefixed
    # objects in the same tenant, so it must not run concurrently with
    # the other three.
    needs: e2e-ca-policies
    if: |
      always() &&
      (needs.e2e-ca-policies.result == 'success' || needs.e2e-ca-policies.result == 'skipped') &&
      (github.event_name != 'workflow_dispatch' || inputs.only_job == 'all' || inputs.only_job == 'auth-methods')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install modules
        shell: pwsh
        run: |
          if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) { Register-PSRepository -Default }
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Microsoft.Graph.Authentication -Force -Scope CurrentUser
          Install-Module Microsoft.Graph.Groups -Force -Scope CurrentUser
          # Security-Groups.ps1 imports Identity.DirectoryManagement — it must be
          # installed fresh alongside Authentication, or the runner's pre-installed
          # copy (built against an older Authentication assembly) fails to import
          # with "Assembly with same name is already loaded" (confirmed live).
          Install-Module Microsoft.Graph.Identity.DirectoryManagement -Force -Scope CurrentUser

      - name: Import auth certificate
        shell: pwsh
        env:
          M365_PFX_BASE64: ${{ secrets.M365_PFX_BASE64 }}
          M365_PFX_PASSWORD: ${{ secrets.M365_PFX_PASSWORD }}
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP 'e2e.pfx'
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:M365_PFX_BASE64))
          $pwd = ConvertTo-SecureString $env:M365_PFX_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $pwd
          Remove-Item $pfxPath -Force
          "CERT_THUMBPRINT=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Run Auth-Methods E2E test
        shell: pwsh
        env:
          M365_TENANT_ID: ${{ secrets.M365_TENANT_ID }}
          M365_APP_ID: ${{ secrets.M365_APP_ID }}
        run: |
          ./Tests/E2E/Invoke-AuthMethodsE2E.ps1 `
            -TenantId $env:M365_TENANT_ID `
            -AppId $env:M365_APP_ID `
            -CertificateThumbprint $env:CERT_THUMBPRINT

      - name: Remove auth certificate
        if: always()
        shell: pwsh
        run: |
          if ($env:CERT_THUMBPRINT) {
            Remove-Item "Cert:\CurrentUser\My\$env:CERT_THUMBPRINT" -ErrorAction SilentlyContinue
          }

  e2e-password-policies:
    name: Password-Policies end-to-end
    runs-on: windows-latest
    timeout-minutes: 20
    # Chained after e2e-auth-methods — this test also invokes
    # Security-Groups.ps1 as a setup step and touches "E2E-" prefixed
    # objects in the same tenant, so it must not run concurrently with
    # the other four.
    needs: e2e-auth-methods
    if: |
      always() &&
      (needs.e2e-auth-methods.result == 'success' || needs.e2e-auth-methods.result == 'skipped') &&
      (github.event_name != 'workflow_dispatch' || inputs.only_job == 'all' || inputs.only_job == 'password-policies')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install modules
        shell: pwsh
        run: |
          if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) { Register-PSRepository -Default }
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Microsoft.Graph.Authentication -Force -Scope CurrentUser
          Install-Module Microsoft.Graph.Groups -Force -Scope CurrentUser
          Install-Module Microsoft.Graph.Identity.DirectoryManagement -Force -Scope CurrentUser
          Install-Module Microsoft.Graph.Identity.SignIns -Force -Scope CurrentUser

      - name: Import auth certificate
        shell: pwsh
        env:
          M365_PFX_BASE64: ${{ secrets.M365_PFX_BASE64 }}
          M365_PFX_PASSWORD: ${{ secrets.M365_PFX_PASSWORD }}
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP 'e2e.pfx'
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:M365_PFX_BASE64))
          $pwd = ConvertTo-SecureString $env:M365_PFX_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $pwd
          Remove-Item $pfxPath -Force
          "CERT_THUMBPRINT=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Run Password-Policies E2E test
        shell: pwsh
        env:
          M365_TENANT_ID: ${{ secrets.M365_TENANT_ID }}
          M365_APP_ID: ${{ secrets.M365_APP_ID }}
        run: |
          ./Tests/E2E/Invoke-PasswordPoliciesE2E.ps1 `
            -TenantId $env:M365_TENANT_ID `
            -AppId $env:M365_APP_ID `
            -CertificateThumbprint $env:CERT_THUMBPRINT

      - name: Remove auth certificate
        if: always()
        shell: pwsh
        run: |
          if ($env:CERT_THUMBPRINT) {
            Remove-Item "Cert:\CurrentUser\My\$env:CERT_THUMBPRINT" -ErrorAction SilentlyContinue
          }

  e2e-device-groups:
    name: Device-Groups end-to-end
    runs-on: windows-latest
    timeout-minutes: 20
    # Chained after e2e-password-policies — this test's cleanup query
    # broad-matches any "E2E-" prefixed group tenant-wide (not just ones it
    # created), so it must not run concurrently with the other five.
    needs: e2e-password-policies
    if: |
      always() &&
      (needs.e2e-password-policies.result == 'success' || needs.e2e-password-policies.result == 'skipped') &&
      (github.event_name != 'workflow_dispatch' || inputs.only_job == 'all' || inputs.only_job == 'device-groups')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install modules
        shell: pwsh
        run: |
          if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) { Register-PSRepository -Default }
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Microsoft.Graph.Authentication -Force -Scope CurrentUser
          Install-Module Microsoft.Graph.Groups -Force -Scope CurrentUser

      - name: Import auth certificate
        shell: pwsh
        env:
          M365_PFX_BASE64: ${{ secrets.M365_PFX_BASE64 }}
          M365_PFX_PASSWORD: ${{ secrets.M365_PFX_PASSWORD }}
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP 'e2e.pfx'
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:M365_PFX_BASE64))
          $pwd = ConvertTo-SecureString $env:M365_PFX_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $pwd
          Remove-Item $pfxPath -Force
          "CERT_THUMBPRINT=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Run Device-Groups E2E test
        shell: pwsh
        env:
          M365_TENANT_ID: ${{ secrets.M365_TENANT_ID }}
          M365_APP_ID: ${{ secrets.M365_APP_ID }}
        run: |
          ./Tests/E2E/Invoke-DeviceGroupsE2E.ps1 `
            -TenantId $env:M365_TENANT_ID `
            -AppId $env:M365_APP_ID `
            -CertificateThumbprint $env:CERT_THUMBPRINT

      - name: Remove auth certificate
        if: always()
        shell: pwsh
        run: |
          if ($env:CERT_THUMBPRINT) {
            Remove-Item "Cert:\CurrentUser\My\$env:CERT_THUMBPRINT" -ErrorAction SilentlyContinue
          }

  e2e-compliance-policies:
    name: Compliance-Policies end-to-end
    runs-on: windows-latest
    timeout-minutes: 20
    # Chained after e2e-device-groups — this test also invokes
    # Device-Groups.ps1 as a setup step and touches "E2E-" prefixed objects
    # in the same tenant, so it must not run concurrently with the other six.
    needs: e2e-device-groups
    if: |
      always() &&
      (needs.e2e-device-groups.result == 'success' || needs.e2e-device-groups.result == 'skipped') &&
      (github.event_name != 'workflow_dispatch' || inputs.only_job == 'all' || inputs.only_job == 'compliance-policies')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install modules
        shell: pwsh
        run: |
          if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) { Register-PSRepository -Default }
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Microsoft.Graph.Authentication -Force -Scope CurrentUser
          Install-Module Microsoft.Graph.Groups -Force -Scope CurrentUser
          Install-Module Microsoft.Graph.DeviceManagement -Force -Scope CurrentUser
          Install-Module Microsoft.Graph.Identity.DirectoryManagement -Force -Scope CurrentUser

      - name: Import auth certificate
        shell: pwsh
        env:
          M365_PFX_BASE64: ${{ secrets.M365_PFX_BASE64 }}
          M365_PFX_PASSWORD: ${{ secrets.M365_PFX_PASSWORD }}
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP 'e2e.pfx'
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:M365_PFX_BASE64))
          $pwd = ConvertTo-SecureString $env:M365_PFX_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $pwd
          Remove-Item $pfxPath -Force
          "CERT_THUMBPRINT=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Run Compliance-Policies E2E test
        shell: pwsh
        env:
          M365_TENANT_ID: ${{ secrets.M365_TENANT_ID }}
          M365_APP_ID: ${{ secrets.M365_APP_ID }}
        run: |
          ./Tests/E2E/Invoke-CompliancePoliciesE2E.ps1 `
            -TenantId $env:M365_TENANT_ID `
            -AppId $env:M365_APP_ID `
            -CertificateThumbprint $env:CERT_THUMBPRINT

      - name: Remove auth certificate
        if: always()
        shell: pwsh
        run: |
          if ($env:CERT_THUMBPRINT) {
            Remove-Item "Cert:\CurrentUser\My\$env:CERT_THUMBPRINT" -ErrorAction SilentlyContinue
          }

  e2e-configuration-policies:
    name: Configuration-Policies end-to-end
    runs-on: windows-latest
    timeout-minutes: 20
    # Chained after e2e-compliance-policies — this test also invokes
    # Device-Groups.ps1 as a setup step and touches "E2E-" prefixed objects
    # in the same tenant, so it must not run concurrently with the other
    # seven.
    needs: e2e-compliance-policies
    if: |
      always() &&
      (needs.e2e-compliance-policies.result == 'success' || needs.e2e-compliance-policies.result == 'skipped') &&
      (github.event_name != 'workflow_dispatch' || inputs.only_job == 'all' || inputs.only_job == 'configuration-policies')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install modules
        shell: pwsh
        run: |
          if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) { Register-PSRepository -Default }
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Microsoft.Graph.Authentication -Force -Scope CurrentUser
          Install-Module Microsoft.Graph.Groups -Force -Scope CurrentUser
          Install-Module Microsoft.Graph.DeviceManagement -Force -Scope CurrentUser
          Install-Module Microsoft.Graph.Identity.DirectoryManagement -Force -Scope CurrentUser

      - name: Import auth certificate
        shell: pwsh
        env:
          M365_PFX_BASE64: ${{ secrets.M365_PFX_BASE64 }}
          M365_PFX_PASSWORD: ${{ secrets.M365_PFX_PASSWORD }}
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP 'e2e.pfx'
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:M365_PFX_BASE64))
          $pwd = ConvertTo-SecureString $env:M365_PFX_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $pwd
          Remove-Item $pfxPath -Force
          "CERT_THUMBPRINT=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: TEMP - Probe WHfB setting ID variants
        shell: pwsh
        env:
          M365_TENANT_ID: ${{ secrets.M365_TENANT_ID }}
          M365_APP_ID: ${{ secrets.M365_APP_ID }}
        run: |
          Connect-MgGraph -TenantId $env:M365_TENANT_ID -ClientId $env:M365_APP_ID -CertificateThumbprint $env:CERT_THUMBPRINT -NoWelcome
          $org = Invoke-MgGraphRequest -Uri "https://graph.microsoft.com/v1.0/organization" -Method GET
          $tenantId = $org.value[0].id
          Write-Host "TenantId length=$($tenantId.Length) dashCount=$(($tenantId.ToCharArray() | Where-Object {$_ -eq '-'}).Count)"

          # Check for a Microsoft-provided template for Windows Hello for Business
          try {
            $templates = Invoke-MgGraphRequest -Uri "https://graph.microsoft.com/beta/deviceManagement/configurationPolicyTemplates?`$filter=contains(displayName,'Hello')" -Method GET
            Write-Host "=== Templates matching 'Hello': $($templates.value.Count) ==="
            $templates.value | ForEach-Object { Write-Host "$($_.id) | $($_.displayName) | lifecycleState=$($_.lifecycleState)" }
          } catch { Write-Host "Template query failed: $($_.Exception.Message)" }

          function Invoke-Probe($label, $body) {
            Write-Host "`n--- Candidate: $label ---"
            try {
              $result = Invoke-MgGraphRequest -Uri "https://graph.microsoft.com/beta/deviceManagement/configurationPolicies" -Method POST -Body ($body | ConvertTo-Json -Depth 20) -ErrorAction Stop
              Write-Host "SUCCESS: created $($result.id)"
              Invoke-MgGraphRequest -Uri "https://graph.microsoft.com/beta/deviceManagement/configurationPolicies('$($result.id)')" -Method DELETE | Out-Null
              Write-Host "cleaned up"
            } catch {
              $msg = $_.Exception.Message
              if ($_.ErrorDetails.Message) { $msg = "$msg | $($_.ErrorDetails.Message)" }
              Write-Host "FAILED: $msg"
            }
          }

          function New-GroupWrapperBody($label, $tid) {
            $usepassportId = "device_vendor_msft_passportforwork_${tid}_policies_usepassportforwork"
            @{
              name = "PROBE-WHfB-$label-$(Get-Random)"
              settings = @(
                @{
                  id = "0"
                  settingInstance = @{
                    settingDefinitionId = "device_vendor_msft_passportforwork_$tid"
                    "@odata.type" = "#microsoft.graph.deviceManagementConfigurationGroupSettingCollectionInstance"
                    groupSettingCollectionValue = @(
                      @{
                        children = @(
                          @{
                            settingDefinitionId = $usepassportId
                            "@odata.type" = "#microsoft.graph.deviceManagementConfigurationChoiceSettingInstance"
                            choiceSettingValue = @{ value = "${usepassportId}_true"; children = @() }
                          }
                        )
                      }
                    )
                  }
                }
              )
              technologies = "mdm"
              platforms = "windows10"
              templateReference = @{ templateId = "" }
            }
          }

          function New-FlatBody($label, $tid) {
            $usepassportId = "device_vendor_msft_passportforwork_${tid}_policies_usepassportforwork"
            @{
              name = "PROBE-WHfB-$label-$(Get-Random)"
              settings = @(
                @{
                  id = "0"
                  settingInstance = @{
                    settingDefinitionId = $usepassportId
                    "@odata.type" = "#microsoft.graph.deviceManagementConfigurationChoiceSettingInstance"
