      - name: Run Retention-Policies E2E test
        shell: pwsh
        env:
          M365_TENANT_ID: ${{ secrets.M365_TENANT_ID }}
          M365_TENANT_DOMAIN: ${{ secrets.M365_TENANT_DOMAIN }}
          M365_APP_ID: ${{ secrets.M365_APP_ID }}
        run: |
          ./Tests/E2E/Invoke-RetentionPoliciesE2E.ps1 `
            -TenantId $env:M365_TENANT_ID `
            -TenantDomain $env:M365_TENANT_DOMAIN `
            -AppId $env:M365_APP_ID `
            -CertificateThumbprint $env:CERT_THUMBPRINT

