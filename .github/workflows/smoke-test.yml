name: Smoke Test (M365 test tenant)

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# Live-tenant tests must never run in parallel with each other
concurrency:
  group: m365-smoke-test
  cancel-in-progress: false

jobs:
  smoke:
    name: App-only API smoke test
    runs-on: windows-latest
    # Forked PRs don't get secrets — skip instead of failing
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install modules
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Microsoft.Graph.Authentication -Force -Scope CurrentUser
          # 3.7.2+ required: -DisableWAM and app-only fixes
          Install-Module ExchangeOnlineManagement -MinimumVersion 3.7.2 -Force -Scope CurrentUser

      - name: Import auth certificate
        shell: pwsh
        env:
          M365_PFX_BASE64: ${{ secrets.M365_PFX_BASE64 }}
          M365_PFX_PASSWORD: ${{ secrets.M365_PFX_PASSWORD }}
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP 'smoke.pfx'
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:M365_PFX_BASE64))
          $pwd = ConvertTo-SecureString $env:M365_PFX_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $pwd
          Remove-Item $pfxPath -Force
          "CERT_THUMBPRINT=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Run smoke tests
        shell: pwsh
        env:
          M365_TENANT_ID: ${{ secrets.M365_TENANT_ID }}
          M365_TENANT_DOMAIN: ${{ secrets.M365_TENANT_DOMAIN }}
          M365_APP_ID: ${{ secrets.M365_APP_ID }}
        run: |
          ./Tests/Smoke/Invoke-SmokeTest.ps1 `
            -TenantId $env:M365_TENANT_ID `
            -TenantDomain $env:M365_TENANT_DOMAIN `
            -AppId $env:M365_APP_ID `
            -CertificateThumbprint $env:CERT_THUMBPRINT

      - name: Remove auth certificate
        if: always()
        shell: pwsh
        run: |
          if ($env:CERT_THUMBPRINT) {
            Remove-Item "Cert:\CurrentUser\My\$env:CERT_THUMBPRINT" -ErrorAction SilentlyContinue
          }
